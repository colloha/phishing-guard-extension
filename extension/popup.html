<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #e6e8eb;
      --muted: #9aa1ab;
      --safe: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --border: #2a2e37;
    }
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 14px;
      margin: 0 0 2px;
      font-weight: 600;
    }
    .header p {
      margin: 0;
      font-size: 11px;
      color: var(--muted);
    }
    .score-block {
      padding: 18px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .score-ring {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
      border: 3px solid var(--border);
      flex-shrink: 0;
    }
    .score-label { font-size: 13px; font-weight: 600; }
    .score-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .breakdown {
      padding: 0 16px 10px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 14px;
    }
    .signals {
      padding: 6px 16px 16px;
      border-top: 1px solid var(--border);
      max-height: 200px;
      overflow-y: auto;
    }
    .signals h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin: 10px 0 6px;
    }
    .signals ul { margin: 0; padding-left: 16px; }
    .signals li { font-size: 12px; margin-bottom: 5px; line-height: 1.4; }
    .empty { padding: 20px 16px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="header">
    <h1>Phishing Guard</h1>
    <p>Student project — domain heuristics + NLP model</p>
  </div>
  <div id="content"></div>
  <script src="popup.js"></script>
</body>
</html>
